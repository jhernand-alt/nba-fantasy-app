name: Build Portable EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js (Modo simple)
        uses: actions/setup-node@v4
        with:
          node-version: 18
          # Hemos eliminado por completo cualquier referencia a cache o lock files

      - name: Instalar dependencias
        run: |
          npm install electron electron-builder --save-dev
          npm install

      - name: Empaquetar Aplicación
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Subir ejecutable a GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Ejecutable-Portable-Windows
          path: dist/*.exe
          if-no-files-found: error
